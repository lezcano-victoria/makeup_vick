{% extends 'base.html' %}

{% block content %}
<div class="menu">
    {% for p in productos %}
    <div class="card">
        <h3>{{ p.nombre }}</h3>
        <p>{{ p.descripcion }}</p>
        <div class="precio">${{ p.precio }}</div>
        <a href="{{ url_for('agregar', id=p.id) }}" class="btn-agregar">Agregar</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
